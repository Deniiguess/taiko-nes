MEMORY {
  HEADER: start=$00, size=$10, fill=yes, fillval=$00;
  ZEROPAGE: start=$00, size=$ff;
  STACK: start=$0100, size=$0100;
  OAMBUFFER: start=$0200, size=$0100;
  RAM: start=$0400, size=$0400;
  SETT: start=$6000, size=$0020;
  SRAM: start=$6020, size=$1FE0;
  DRAW: start=$0300, size=$00E0;
  PAL: start=$03E0, size=$0020;

  MAING: start=$8000, size=$2000, fill=yes, fillval=$ff;
  TSCRNSSRS: start=$8000, size=$2000, fill=yes, fillval=$ff;

  DBANK1: start=$A000, size=$2000, fill=yes, fillval=$00;

  MBANKS: start=$C000, size=$2000, fill=yes, fillval=$ff;
  MBANKSS: start=$A000, size=$4000, fill=yes, fillval=$ff;

  MBANK1: start=$C000, size=$2000, fill=yes, fillval=$ff;
  MBANK2: start=$C000, size=$2000, fill=yes, fillval=$ff;
  MBANK3: start=$C000, size=$2000, fill=yes, fillval=$ff;
  MBANK4: start=$C000, size=$2000, fill=yes, fillval=$ff;
  MBANK5: start=$C000, size=$2000, fill=yes, fillval=$ff;
  MBANK6: start=$C000, size=$4000, fill=yes, fillval=$ff;

  BANK3: start=$E000, size=$1FFA, fill=yes, fillval=$ff;

  VECTORS:  start = $fffa, size = $6, file = %O, fill = yes;
  CHRROM: start=$0000, size=$4000, fill=yes, fillval=$00;
}

SEGMENTS {
  HEADER: load=HEADER, type=ro, align=$10;
  ZEROPAGE: load=ZEROPAGE, type=zp;
  STACK: load=STACK, type=bss, optional=yes;
  BSS: load=RAM, type=bss, optional=yes;
  SETT: load=SETT, type=bss, optional=yes;
  SRAM: load=SRAM, type=bss, optional=yes;
  DRAW: load=DRAW, type=bss, optional=yes;
  PAL: load=PAL, type=bss, optional=yes;

  MAIN_GAME: load=MAING, type=ro, start=$8000;
  TITL_SCEN_SONG_SEL_RES: load=TSCRNSSRS, type=ro, start=$8000;

  START: load=BANK3, type=ro;

  DRUM_BANK_1: load=DBANK1, type=ro, start=$A000;

  MUSIC_BANK_SONGSELS: load=MBANKS, type=ro, start=$C000;
  MUSIC_BANK_SONGSEL: load=MBANKSS, type=ro, start=$C000;
  MUSIC_BANK_1: load=MBANK1, type=ro, start=$C000;
  MUSIC_BANK_2: load=MBANK2, type=ro, start=$C000;
  MUSIC_BANK_3: load=MBANK3, type=ro, start=$C000;
  MUSIC_BANK_4: load=MBANK4, type=ro, start=$C000;
  MUSIC_BANK_5: load=MBANK5, type=ro, start=$C000;
  MUSIC_BANK_6: load=MBANK6, type=ro, start=$C000;

  DMC: load=BANK3, type=ro, optional=yes, start=$FBC0;
  VECTORS: load=VECTORS, type=ro, start=$FFFA;
  CHR: load=CHRROM, type=ro, align=16, optional=yes;
}
